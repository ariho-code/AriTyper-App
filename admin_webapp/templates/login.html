<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AriTyper Admin - Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" />
  <style>
    :root {
      --bg: #050a10;
      --surface: #0c1520;
      --card: #111d2b;
      --border: #1a2d42;
      --cyan: #00e5ff;
      --blue: #1565ff;
      --green: #00ff87;
      --orange: #ff6b35;
      --text: #e8f4f8;
      --muted: #6b8ca4;
      --font-head: 'Outfit', sans-serif;
      --font-mono: 'Space Mono', monospace;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-head);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
    }
    .login-container {
      width: 100%;
      max-width: 420px;
      padding: 20px;
    }
    .login-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 40px;
      position: relative;
      overflow: hidden;
    }
    .login-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--blue), var(--cyan), var(--green));
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      font-family: var(--font-mono);
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--cyan);
      letter-spacing: 0.05em;
      margin-bottom: 32px;
      justify-content: center;
    }
    .logo svg { width: 36px; height: 36px; }
    h1 {
      font-size: 1.8rem;
      font-weight: 800;
      margin-bottom: 8px;
      text-align: center;
    }
    .subtitle {
      color: var(--muted);
      text-align: center;
      margin-bottom: 32px;
      font-size: 0.95rem;
    }
    .form-group {
      margin-bottom: 20px;
    }
    .form-label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      font-size: 0.9rem;
      color: var(--text);
    }
    .form-input {
      width: 100%;
      padding: 14px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: var(--font-head);
      font-size: 1rem;
      transition: border-color 0.3s, box-shadow 0.3s;
    }
    .form-input:focus {
      outline: none;
      border-color: var(--cyan);
      box-shadow: 0 0 0 3px rgba(0,229,255,0.1);
    }
    .btn-login {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, var(--blue), var(--cyan));
      color: var(--bg);
      border: none;
      border-radius: 10px;
      font-weight: 800;
      font-size: 1.05rem;
      cursor: pointer;
      font-family: var(--font-head);
      transition: transform 0.2s, box-shadow 0.2s;
      margin-top: 24px;
    }
    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 36px rgba(0,229,255,0.35);
    }
    .alert {
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 0.9rem;
    }
    .alert-error {
      background: rgba(255,107,53,0.1);
      border: 1px solid rgba(255,107,53,0.3);
      color: var(--orange);
    }
    .footer-note {
      text-align: center;
      color: var(--muted);
      font-size: 0.85rem;
      margin-top: 24px;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="logo">
        <!-- SVG LOGO -->
        <svg viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect width="36" height="36" rx="8" fill="#00e5ff" fill-opacity="0.12"/>
          <rect x="5" y="10" width="26" height="16" rx="3" stroke="#00e5ff" stroke-width="1.5"/>
          <rect x="8" y="13" width="4" height="3" rx="1" fill="#00e5ff"/>
          <rect x="14" y="13" width="4" height="3" rx="1" fill="#00e5ff"/>
          <rect x="20" y="13" width="4" height="3" rx="1" fill="#00e5ff"/>
          <rect x="8" y="18" width="10" height="3" rx="1" fill="#00e5ff" opacity="0.5"/>
          <rect x="20" y="18" width="8" height="3" rx="1" fill="#1565ff"/>
          <circle cx="28" cy="7" r="4" fill="#00ff87"/>
          <path d="M26.5 7l1 1 2-2" stroke="#050a10" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        AriTyper Admin
      </div>
      
      <h1>Admin Login</h1>
      <p class="subtitle">Access device management and license approval</p>
      
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          {% for category, message in messages %}
            <div class="alert alert-{{ category }}">{{ message }}</div>
          {% endfor %}
        {% endif %}
      {% endwith %}
      
      <form method="POST">
        <div class="form-group">
          <label class="form-label" for="username">Username</label>
          <input type="text" id="username" name="username" class="form-input" required>
        </div>
        
        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input type="password" id="password" name="password" class="form-input" required>
        </div>
        
        <button type="submit" class="btn-login">
          <i class="fas fa-sign-in-alt" style="margin-right: 8px;"></i>
          Login to Admin Panel
        </button>
      </form>
      
      <p class="footer-note">
        Default credentials: admin / admin123
      </p>
    </div>
  </div>
</body>
</html>
