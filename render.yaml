services:
  - type: web
    name: arityper-api
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python admin_webapp/app.py
    envVars:
      - key: FLASK_ENV
        value: production
      - key: PORT
        value: 10000
      - key: PYTHON_VERSION
        value: 3.9
    healthCheckPath: /admin
